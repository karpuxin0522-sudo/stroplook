<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STROPLOOK | Napínané stropy Bratislava</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:Arial,sans-serif;background:#050505;color:#fff}
a{text-decoration:none;color:inherit}
section{padding:100px 7%}

.hero{
min-height:100vh;
padding:30px 7%;
display:flex;
flex-direction:column;
justify-content:space-between;
background:
linear-gradient(90deg,rgba(0,0,0,.92),rgba(0,0,0,.35)),
url("https://vipceiling.ru/image/photo/portfolio/natyazhnye-potolki-v-gostinoj-matovye-trek-94_l.jpg");
background-size:cover;
background-position:center;
}

.nav{display:flex;justify-content:space-between;align-items:center;gap:15px}
.logo{font-size:32px;font-weight:900;letter-spacing:-1px}
.logo span{color:#dff4ff}

.socials{display:flex;gap:12px;flex-wrap:wrap}
.btn{
display:inline-block;
padding:16px 28px;
border-radius:50px;
font-weight:900;
color:white;
transition:.3s;
}
.btn:hover{transform:translateY(-3px)}
.whatsapp{background:#25D366}
.facebook{background:#1877F2}
.glass{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18)}

.hero-text{max-width:850px;padding-bottom:90px}
.badge{
display:inline-block;
background:rgba(255,255,255,.12);
padding:12px 18px;
border-radius:40px;
margin-bottom:25px;
backdrop-filter:blur(10px);
}

h1{
font-size:clamp(48px,9vw,110px);
line-height:.9;
letter-spacing:-5px;
margin-bottom:30px;
}

.hero p,.sub{
font-size:21px;
line-height:1.7;
color:#ddd;
max-width:800px;
margin-bottom:35px;
}

.title{
font-size:clamp(38px,6vw,76px);
line-height:.95;
letter-spacing:-3px;
margin-bottom:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:28px;
}

.card{
background:#111;
border:1px solid rgba(255,255,255,.1);
border-radius:34px;
overflow:hidden;
box-shadow:0 30px 80px rgba(0,0,0,.5);
transition:.35s;
}
.card:hover{transform:translateY(-8px)}

.card img{
width:100%;
height:430px;
object-fit:cover;
display:block;
background:#111;
}

.card div{padding:30px}
.card h3{font-size:30px;margin-bottom:12px}
.card p{color:#aaa;line-height:1.7;font-size:17px}

.services{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:40px;
}

.service{
padding:26px;
border-radius:26px;
background:#0f0f0f;
border:1px solid rgba(255,255,255,.1);
font-weight:800;
color:#ddd;
}

.contact{text-align:center}
.contact-box{
padding:70px;
border-radius:40px;
background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.03));
border:1px solid rgba(255,255,255,.1);
}
.phone{font-size:40px;font-weight:900;margin:25px 0;color:#dff4ff}

.float{
position:fixed;
right:22px;
bottom:22px;
display:flex;
flex-direction:column;
gap:12px;
z-index:99;
}
.float a{
width:64px;height:64px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:30px;box-shadow:0 15px 40px rgba(0,0,0,.45);
}

footer{text-align:center;color:#777;padding:35px}

@media(max-width:900px){
.grid,.services{grid-template-columns:1fr}
.card img{height:330px}
h1{letter-spacing:-2px}
.phone{font-size:28px}
.nav{align-items:flex-start}
}
</style>
</head>

<div class
