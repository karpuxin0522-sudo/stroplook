<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StropLook | Interiérové práce</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: #fff;
}

a {
  text-decoration: none;
  color: inherit;
}

.hero {
  min-height: 92vh;
  background:
    linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.85)),
    url("https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  padding: 25px 18px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.logo {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: 1px;
}

.logo span {
  color: #35d0ff;
}

.hero-content {
  max-width: 760px;
  margin-bottom: 60px;
}

.hero-content h1 {
  font-size: 58px;
  line-height: 1.05;
  margin: 0 0 18px;
}

.hero-content p {
  font-size: 22px;
  color: #ddd;
  margin-bottom: 30px;
}

.buttons {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn {
  padding: 16px 24px;
  border-radius: 40px;
  font-weight: 700;
  display: inline-block;
}

.btn-main {
  background: linear-gradient(135deg, #00c6ff, #7b2ff7);
}

.btn-whatsapp {
  background: #25d366;
  color: #07120b;
}

.section {
  padding: 65px 18px;
  max-width: 1200px;
  margin: auto;
}

.section h2 {
  font-size: 36px;
  margin-bottom: 12px;
  text-align: center;
}

.section-subtitle {
  color: #aaa;
  text-align: center;
  margin-bottom: 35px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 18px;
}

.card {
  background: #121923;
  border: 1px solid #263241;
  border-radius: 22px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,.25);
}

.card h3 {
  margin-top: 0;
  font-size: 22px;
}

.card p {
  color: #bbb;
  line-height: 1.5;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 18px;
}

.gallery img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 24px;
}

.contact {
  background: linear-gradient(135deg, #101820, #182536);
  border-radius: 28px;
  padding: 40px 20px;
  text-align: center;
}

.phone {
  font-size: 34px;
  font-weight: 800;
  margin: 18px 0;
  color: #35d0ff;
}

footer {
  text-align: center;
  padding: 30px 15px 95px;
  color: #777;
}

.bottom-bar {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 12px;

  border-radius: 24px;
  padding: 10px;
