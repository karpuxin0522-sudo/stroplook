<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stavebné práce</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: white;
}

/* HERO */
header {
    height: 90vh;
    background: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
}

header::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.65);
}

.hero {
    position: relative;
    z-index: 2;
}

.hero h1 {
    font-size: 48px;
}

.hero p {
    font-size: 20px;
    color: #ddd;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 30px;
    background: linear-gradient(45deg, #6a11cb, #2575fc);
    border-radius: 30px;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* SECTION */
.section {
    padding: 60px 20px;
    text-align: center;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 15px;
    height: 220px;
    object-fit: cover;
}

/* SERVICES */
.services {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.service {
    background: #1c1c1c;
    padding: 25px;
    border-radius: 15px;
    width: 260px;
    transition: 0.3s;
}

.service:hover {
    transform: translateY(-5px);
    background: #252525;
}

/* CONTACT */
.contact {
    background: #111;
}

.phone {
    font-size: 28px;
    color: #6a11cb;
    font-weight: bold;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    background: #000;
}
</style>

</head>
<body>

<header>
    <div class="hero">
        <h1>Stavebné a interiérové práce</h1>
        <p>Kvalita • Rýchlosť • Profesionálny prístup</p>
        <a class="btn" href="tel:+421952277013">📞 Zavolať</a>
    </div>
</header>
